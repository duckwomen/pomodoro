<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odaklanma İstasyonu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-bg: #020617; --overlay: rgba(0, 0, 0, 0.65); }
        
        * { font-family: 'Montserrat', sans-serif; }

        body {
            margin: 0; padding: 0; color: white;
            transition: all 1s ease; min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; background-size: cover; background-position: center; background-attachment: fixed;
            background-color: var(--primary-bg);
        }

        /* İstediğin Samanyolu Arka Planı */
        .work-theme { 
            background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1920&q=80'); 
        }
        .break-theme { 
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80'); 
        }

        .overlay { background: var(--overlay); width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        
        .main-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 95%; max-width: 500px; margin-top: 20px; }
        
        #timer { 
            font-size: clamp(80px, 15vw, 110px); 
            font-weight: 700; 
            margin: 10px 0; 
            letter-spacing: -2px;
        }
        
        .controls input, select { 
            padding: 10px; border-radius: 8px; border: none; margin: 5px; 
            background: rgba(255, 255, 255, 0.9); font-weight: 600;
        }

        .buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        
        .buttons button { 
            background: white; color: #020617; border: none; padding: 15px 30px; 
            border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s;
            text-transform: uppercase; font-size: 14px;
        }

        .buttons button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .extra-tools { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 95%; max-width: 850px; margin-top: 30px; }
        
        .tool-box { background: rgba(0, 0, 0, 0.75); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        h3 { font-weight: 700; font-size: 18px; margin-top: 0; color: #cbd5e1; }

        textarea { 
            width: 100%; height: 120px; background: rgba(255,255,255,0.03); color: white; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; 
            box-sizing: border-box; resize: none; font-size: 14px;
        }
        
        #comet-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
        
        .footer-widgets { 
            margin-top: auto; padding: 30px; text-align: center; width: 100%; 
            background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.05);
        }

        .prayer-list { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 15px; color: #fbbf24; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body class="work-theme" id="bodyTag">

    <canvas id="comet-canvas"></canvas>

    <div class="overlay">
        <h1 id="status-text" style="font-weight: 300; letter-spacing: 5px; text-transform: uppercase;">İyi Çalışmalar</h1>
        <p style="opacity: 0.6; font-size: 14px;">Tamamlanan Seans: <span id="pomo-count" style="font-weight: 700;">0</span></p>

        <div class="main-card">
            <div class="controls">
                <input type="number" id="workInput" value="50"> 
                <input type="number" id="breakInput" value="10">
            </div>

            <div id="timer">50:00</div>

            <div class="buttons">
                <button onclick="toggleTimer()" id="startBtn">Başlat</button>
                <button onclick="resetTimer()" style="background: #ef4444; color: white;">Sıfırla</button>
                <button onclick="requestFullScreen()">Tam Ekran</button>
            </div>

            <div style="margin-top: 25px;">
                <select id="soundSelect" onchange="changeSound()">
                    <option value="none">Sessiz Mod</option>
                    <option value="rain">Yağmur Sesi</option>
                    <option value="library">Kütüphane Sesi</option>
                </select>
            </div>
        </div>

        <div class="extra-tools">
            <div class="tool-box">
                <h3>Motivasyon Kutusu</h3>
                <p id="mot-text" style="font-weight: 300; font-style: italic; line-height: 1.6;">"Derin odaklanma, başarının anahtarıdır."</p>
                <button onclick="newQuote()" style="background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px;">Yeni Söz</button>
            </div>
            <div class="tool-box">
                <h3>Notlarım</h3>
                <textarea id="notesArea" placeholder="Notlarını buraya kaydedebilirsin..."></textarea>
            </div>
        </div>

        <div class="footer-widgets">
            <div id="clock" style="font-size: 22px; font-weight: 700; letter-spacing: 2px;">00:00:00</div>
            <div style="margin-top: 15px; font-size: 13px; opacity: 0.8;">
                Şehir: 
                <select id="citySelect" onchange="getPrayerTimes()" style="background: transparent; color: white; border: 1px solid white;">
                    <option value="Konya" style="color: black;">Konya</option>
                    <option value="Istanbul" style="color: black;">İstanbul</option>
                    <option value="Ankara" style="color: black;">Ankara</option>
                    <option value="Izmir" style="color: black;">İzmir</option>
                </select>
            </div>
            <div id="prayer-times" class="prayer-list">Vakitler yükleniyor...</div>
        </div>
    </div>

    <audio id="rainAudio" loop><source src="https://www.soundjay.com/nature/rain-07.mp3" type="audio/mpeg"></audio>
    <audio id="libraryAudio" loop><source src="https://www.soundjay.com/misc/sounds/ambience-library-1.mp3" type="audio/mpeg"></audio>

    <script>
        let timer;
        let timeLeft = 50 * 60;
        let isRunning = false;
        let isWorkTime = true;
        let totalPomo = 0;
        let sessionTracker = 0;

        function changeSound() {
            const rain = document.getElementById('rainAudio');
            const library = document.getElementById('libraryAudio');
            const choice = document.getElementById('soundSelect').value;
            rain.pause(); library.pause();
            if(choice === 'rain') rain.play().catch(e => alert("Sesi duymak için önce sayfada herhangi bir yere tıklayın."));
            if(choice === 'library') library.play().catch(e => alert("Sesi duymak için önce sayfada herhangi bir yere tıklayın."));
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                document.getElementById('startBtn').innerText = "Devam Et";
            } else {
                timer = setInterval(countDown, 1000);
                document.getElementById('startBtn').innerText = "Durdur";
            }
            isRunning = !isRunning;
        }

        function countDown() {
            timeLeft--; updateDisplay();
            if (timeLeft <= 0) {
                clearInterval(timer); isRunning = false;
                if (isWorkTime) {
                    totalPomo++; sessionTracker++;
                    document.getElementById('pomo-count').innerText = totalPomo;
                    if(sessionTracker % 2 === 0) startComets();
                    isWorkTime = false;
                    timeLeft = document.getElementById('breakInput').value * 60;
                    document.getElementById('status-text').innerText = "Biraz Dinlen";
                    document.getElementById('bodyTag').className = "break-theme";
                } else {
                    isWorkTime = true;
                    timeLeft = document.getElementById('workInput').value * 60;
                    document.getElementById('status-text').innerText = "İyi Çalışmalar";
                    document.getElementById('bodyTag').className = "work-theme";
                }
                updateDisplay();
                document.getElementById('startBtn').innerText = "Başlat";
            }
        }

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetTimer() {
            clearInterval(timer); isRunning = false; isWorkTime = true;
            timeLeft = document.getElementById('workInput').value * 60;
            updateDisplay();
            document.getElementById('startBtn').innerText = "Başlat";
            document.getElementById('bodyTag').className = "work-theme";
            document.getElementById('status-text').innerText = "İyi Çalışmalar";
        }

        function requestFullScreen() {
            let elem = document.documentElement;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        async function getPrayerTimes() {
            const city = document.getElementById('citySelect').value;
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Turkey&method=13`);
            const data = await res.json();
            const t = data.data.timings;
            document.getElementById('prayer-times').innerHTML = `
                <span>İmsak: ${t.Fajr}</span> <span>Öğle: ${t.Dhuhr}</span> 
                <span>İkindi: ${t.Asr}</span> <span>Akşam: ${t.Maghrib}</span> <span>Yatsı: ${t.Isha}</span>
            `;
        }
        getPrayerTimes();

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function startComets() {
            const canvas = document.getElementById('comet-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            for(let i=0; i<25; i++) particles.push({x: Math.random()*canvas.width, y: -50, v: 12 + Math.random()*10});
            let start = Date.now();
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 2;
                particles.forEach(p => {
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - 40, p.y + 40); ctx.stroke();
                    p.x += p.v; p.y += p.v;
                });
                if(Date.now() - start < 5000) requestAnimationFrame(draw);
            }
            draw();
        }

        const quotes = ["Gelecek, bugünden ona hazırlananlarındır.", "Zihin dinlenince çiçek açar.", "Tıp bir sabır işidir, devam et!", "Başarı, hazırlıkla fırsatın karşılaştığı yerdir."];
        function newQuote() { document.getElementById('mot-text').innerText = quotes[Math.floor(Math.random() * quotes.length)]; }
    </script>
</body>
</html>
